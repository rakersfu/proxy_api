name: Unzip and Push to Root

on:
  workflow_dispatch:

env:
  ZIP_FILE: proxy_api_docker-main.zip
  COMMIT_MESSAGE: "Unzipped and committed content"

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: false  # 禁用默认 token，改用你自己的

    - name: Unzip to root directory
      run: |
        unzip "$ZIP_FILE"
        rm "$ZIP_FILE"

    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

    - name: Commit and push
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git add .
        git commit -m "$COMMIT_MESSAGE" || echo "Nothing to commit"
        git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
        git push origin HEAD:main --force
